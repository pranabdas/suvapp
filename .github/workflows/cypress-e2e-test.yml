name: Cypress E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e-tests:
    permissions:
      contents: read

    strategy:
      # when one test fails, DO NOT cancel the others
      fail-fast: false
      matrix:
        os: ["macos-latest", "ubuntu-latest", "windows-latest"]
        browser: ["chrome", "firefox"]
        include:
          - os: "macos-latest"
            browser: "electron"
          - os: "ubuntu-latest"
            browser: "chromium"
          - os: "windows-latest"
            browser: "edge"
        exclude:
          - os: "macos-latest"
            browser: "firefox"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare Node environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"

      - name: Cypress run
        uses: cypress-io/github-action@783cb3f07983868532cabaedaa1e6c00ff4786a8 # v7.1.9
        with:
          browser: ${{ matrix.browser }}
          install-command: bash plotly-custom-build.sh
          start: npm start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 300
